openapi: 3.1.0
info:
  title: Módulo predefinido
  description: ''
  version: 1.0.0
tags: []
paths:
  /api/me:
    get:
      summary: me
      deprecated: false
      description: Retorna o usuário autenticado via token Sanctum (Authorization Bearer).
      tags: []
      parameters:
        - name: Accept
          in: header
          description: ''
          required: false
          example: application/json
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/meResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthenticated'
          description: Requisição sem credenciais válidas (token ausente ou inválido).
      security:
        - bearerAuth: []
  /api/register:
    post:
      summary: register
      deprecated: false
      description: ''
      tags: []
      parameters:
        - name: Accept
          in: header
          description: ''
          required: false
          example: application/json
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - channel
                - payload
              properties:
                channel:
                  $ref: '#/components/schemas/channel'
                payload:
                  type: object
                  required:
                    - name
                    - email
                    - password
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                    password:
                      type: string
            example:
              channel: internal
              payload:
                name: Lucas Kaiut
                email: lucas.kaiut@gmail.com
                password: abc@123
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/loginRegisterSuccess'
              example:
                data:
                  token: 1|examplePlainTextToken
                  user:
                    id: 1
                    name: Lucas Kaiut
                    email: lucas.kaiut@gmail.com
          headers: {}
        '422':
          description: ''
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - errors
                properties:
                  message:
                    type: string
                  errors:
                    type: object
                    required:
                      - channel
                      - payload
                    properties:
                      channel:
                        type: array
                        items:
                          type: string
                      payload:
                        type: array
                        items:
                          type: string
          headers: {}
      security: []
  /api/login:
    post:
      summary: login
      deprecated: false
      description: ''
      tags: []
      parameters:
        - name: Accept
          in: header
          description: ''
          required: false
          example: application/json
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - channel
                - payload
              properties:
                channel:
                  $ref: '#/components/schemas/channel'
                payload:
                  type: object
                  required:
                    - email
                    - password
                  properties:
                    email:
                      type: string
                    password:
                      type: string
            example:
              channel: internal
              payload:
                email: admin@example.com
                password: secret
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/loginRegisterSuccess'
          headers: {}
        '401':
          description: ''
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - errors
                properties:
                  message:
                    type: string
                  errors:
                    type: object
                    required:
                      - credentials
                    properties:
                      credentials:
                        type: array
                        items:
                          type: string
          headers: {}
        '422':
          description: ''
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - errors
                properties:
                  message:
                    type: string
                  errors:
                    type: object
                    required:
                      - channel
                      - payload
                    properties:
                      channel:
                        type: array
                        items:
                          type: string
                      payload:
                        type: array
                        items:
                          type: string
          headers: {}
      security: []
webhooks: {}
components:
  schemas:
    channel:
      type: string
      enum:
        - internal
    loginRegisterSuccess:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/authTokenAndUser'
      required:
        - data
    authTokenAndUser:
      type: object
      required:
        - token
        - user
      properties:
        user:
          $ref: '#/components/schemas/user'
        token:
          type: string
    user:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
    meResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/user'
          required:
            - user
  responses:
    Unauthenticated:
      description: Requisição sem credenciais válidas (token ausente ou inválido).
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Token pessoal Sanctum retornado em login ou registro.
servers: []
security: []
