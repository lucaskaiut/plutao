services:
  mysql:
    image: mysql:8.4
    container_name: plutao_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-plutao}
      MYSQL_USER: ${MYSQL_USER:-plutao}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-plutao}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s

  redis:
    image: redis:7-alpine
    container_name: plutao_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ./api
      dockerfile: docker/php/Dockerfile
    container_name: plutao_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: plutao_nginx
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-8080}:80"
    volumes:
      - ./api:/var/www/html:ro
      - ./docker/nginx/laravel.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  web:
    image: node:24-slim
    container_name: plutao_web
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "${NEXT_PORT:-3000}:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      API_BASE_URL: ${API_BASE_URL:-http://nginx/api}
    command:
      [
        "sh",
        "-c",
        '[ -d node_modules/next ] || npm ci; npm run dev -- --hostname 0.0.0.0 --port 3000',
      ]

volumes:
  mysql_data:
  web_node_modules:
